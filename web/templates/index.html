<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚦 交通标志检测系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-button {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            font-size: 1.1em;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            color: #4facfe;
            border-bottom: 3px solid #4facfe;
            background: #f8f9ff;
        }

        .tab-button:hover {
            background: #f0f0f0;
        }

        .tab-content {
            padding: 30px;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .upload-section {
            text-align: center;
            padding: 30px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            border-color: #4facfe;
            background: #f0f8ff;
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 15px;
            color: #999;
        }

        .upload-label {
            display: block;
            margin-bottom: 15px;
            font-size: 1.2em;
            font-weight: 500;
            color: #555;
        }

        #file-input {
            display: none;
        }

        .custom-file-upload {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .custom-file-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .preview-container {
            margin-top: 20px;
            max-height: 400px;
            overflow: hidden;
            border-radius: 10px;
            border: 2px solid #ddd;
            display: none;
        }

        .preview-container.show {
            display: block;
        }

        #image-preview {
            max-width: 600px;
            max-height: 400px;
            width: auto;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .file-info {
            margin-top: 15px;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 5px;
            color: #1976d2;
            font-weight: 500;
        }

        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .progress-text {
            margin-top: 10px;
            color: #666;
            font-size: 0.9em;
        }

        /* URL 输入模式相关样式 */
        .mode-switcher {
            display: flex;
            background: #f0f0f0;
            border-radius: 25px;
            padding: 4px;
            margin-bottom: 20px;
            width: fit-content;
            margin: 0 auto 20px;
        }

        .mode-btn {
            padding: 8px 22px;
            border: none;
            border-radius: 21px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #888;
            transition: all 0.25s ease;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            box-shadow: 0 3px 10px rgba(79, 172, 254, 0.35);
        }

        .url-input-wrap {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: center;
        }

        .url-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.2s;
        }

        .url-input:focus {
            border-color: #4facfe;
        }

        .url-preview-wrap {
            margin-top: 15px;
            display: none;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ddd;
            max-height: 300px;
        }

        .url-preview-wrap.show {
            display: block;
        }

        .url-preview-wrap img {
            max-width: 100%;
            max-height: 298px;
            display: block;
            margin: 0 auto;
        }

        .url-error {
            color: #e53935;
            font-size: 0.88em;
            margin-top: 6px;
            display: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .tab-content {
                padding: 20px;
            }
            
            .upload-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚦 交通标志检测系统</h1>
            <p>基于 RT-DETR 的智能交通标志识别与分析</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="openTab(event, 'image')">📷 图片检测</button>
            <button class="tab-button" onclick="openTab(event, 'video')">🎥 视频检测</button>
        </div>

        <div class="tab-content">
            <!-- 图片检测面板 -->
            <div id="image" class="tab-panel active">

                <!-- 输入模式切换 -->
                <div class="mode-switcher">
                    <button class="mode-btn active" id="mode-file-btn" onclick="switchImageMode('file')">📁 本地文件</button>
                    <button class="mode-btn" id="mode-url-btn" onclick="switchImageMode('url')">🔗 图片网址</button>
                </div>

                <!-- 本地文件模式 -->
                <form id="image-form" method="POST" enctype="multipart/form-data" action="/predict">
                    <div id="file-mode-section">
                        <div class="upload-section">
                            <div class="upload-icon">📁</div>
                            <div class="upload-label">上传图片进行交通标志检测</div>
                            <label for="file-input" class="custom-file-upload">
                                选择图片文件
                            </label>
                            <input type="file" name="image" id="file-input" accept="image/*">

                            <div id="file-info" class="file-info" style="display: none;"></div>

                            <div id="preview-container" class="preview-container">
                                <img id="image-preview" src="" alt="图片预览">
                            </div>
                        </div>
                    </div>

                    <!-- URL 模式区域（视觉上属于同一 form，但由 JS 控制提交） -->
                    <div id="url-mode-section" style="display:none;">
                        <div class="upload-section">
                            <div class="upload-icon">🔗</div>
                            <div class="upload-label">输入图片网址进行交通标志检测</div>
                            <div class="url-input-wrap">
                                <input type="url" id="image-url-input" class="url-input"
                                       placeholder="https://example.com/image.jpg">
                            </div>
                            <div class="url-error" id="url-error">⚠️ 无法加载图片，请检查网址是否有效</div>
                            <div class="url-preview-wrap" id="url-preview-wrap">
                                <img id="url-preview" src="" alt="图片预览">
                            </div>
                        </div>
                    </div>

                    <!-- 检测参数调整 -->
                    <div style="margin: 20px;">
                        <h3 style="text-align: center; color: #333; margin-bottom: 20px;">检测参数调整</h3>

                        <div style="margin-bottom: 20px;">
                            <label for="conf-thres" style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">
                                置信度阈值: <span id="conf-thres-value">0.25</span>
                            </label>
                            <input type="range" name="conf_thres" id="conf-thres" min="0.01" max="1.0" step="0.01" value="0.25"
                                   style="width: 100%; height: 8px; border-radius: 5px; background: #ddd; outline: none; -webkit-appearance: none;">
                            <div style="display: flex; justify-content: space-between; color: #666; font-size: 0.8em;">
                                <span>0.01</span>
                                <span>1.00</span>
                            </div>
                        </div>

                        <div style="margin-bottom: 20px;">
                            <label for="iou-thres" style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">
                                IoU阈值: <span id="iou-thres-value">0.45</span>
                            </label>
                            <input type="range" name="iou_thres" id="iou-thres" min="0.01" max="1.0" step="0.01" value="0.45"
                                   style="width: 100%; height: 8px; border-radius: 5px; background: #ddd; outline: none; -webkit-appearance: none;">
                            <div style="display: flex; justify-content: space-between; color: #666; font-size: 0.8em;">
                                <span>0.01</span>
                                <span>1.00</span>
                            </div>
                        </div>
                    </div>

                    <div class="progress-container" id="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <div class="progress-text" id="progress-text">准备上传...</div>
                    </div>

                    <center>
                        <button type="submit" class="upload-btn" id="upload-btn">开始检测</button>
                    </center>
                </form>
            </div>

            <!-- 视频检测面板 -->
            <div id="video" class="tab-panel">
                <form id="video-form" method="POST" enctype="multipart/form-data" action="/predict_video">
                    <div class="upload-section">
                        <div class="upload-icon">🎬</div>
                        <div class="upload-label">上传视频进行交通标志检测</div>
                        <label for="video-input" class="custom-file-upload">
                            选择视频文件
                        </label>
                        <input hidden type="file" name="video" id="video-input" accept="video/*" required>
                        
                        <div id="video-info" class="file-info" style="display: none;"></div>
                    </div>
                    
                    <!-- 检测参数调整 -->
                    <div style="margin: 20px;">
                        <h3 style="text-align: center; color: #333; margin-bottom: 20px;">检测参数调整</h3>
                        
                        <div style="margin-bottom: 20px;">
                            <label for="video-conf-thres" style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">
                                置信度阈值: <span id="video-conf-thres-value">0.25</span>
                            </label>
                            <input type="range" name="conf_thres" id="video-conf-thres" min="0.01" max="1.0" step="0.01" value="0.25" 
                                   style="width: 100%; height: 8px; border-radius: 5px; background: #ddd; outline: none; -webkit-appearance: none;">
                            <div style="display: flex; justify-content: space-between; color: #666; font-size: 0.8em;">
                                <span>0.01</span>
                                <span>1.00</span>
                            </div>
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <label for="video-iou-thres" style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">
                                IoU阈值: <span id="video-iou-thres-value">0.45</span>
                            </label>
                            <input type="range" name="iou_thres" id="video-iou-thres" min="0.01" max="1.0" step="0.01" value="0.45" 
                                   style="width: 100%; height: 8px; border-radius: 5px; background: #ddd; outline: none; -webkit-appearance: none;">
                            <div style="display: flex; justify-content: space-between; color: #666; font-size: 0.8em;">
                                <span>0.01</span>
                                <span>1.00</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="progress-container" id="video-progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="video-progress-fill"></div>
                        </div>
                        <div class="progress-text" id="video-progress-text">准备上传...</div>
                    </div>
                    
                    <center>
                        <button type="submit" class="upload-btn" id="video-upload-btn">开始检测</button>
                    </center>
                </form>
            </div>
        </div>
        
        <script>
            // 实时更新滑块值
            document.getElementById('conf-thres').addEventListener('input', function(e) {
                document.getElementById('conf-thres-value').textContent = parseFloat(e.target.value).toFixed(2);
            });
            
            document.getElementById('iou-thres').addEventListener('input', function(e) {
                document.getElementById('iou-thres-value').textContent = parseFloat(e.target.value).toFixed(2);
            });
            
            document.getElementById('video-conf-thres').addEventListener('input', function(e) {
                document.getElementById('video-conf-thres-value').textContent = parseFloat(e.target.value).toFixed(2);
            });
            
            document.getElementById('video-iou-thres').addEventListener('input', function(e) {
                document.getElementById('video-iou-thres-value').textContent = parseFloat(e.target.value).toFixed(2);
            });
        </script>
    </div>

    <script>
        // 选项卡切换
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            
            tabcontent = document.getElementsByClassName("tab-panel");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].classList.remove("active");
            }
            
            tablinks = document.getElementsByClassName("tab-button");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // ===== 图片输入模式切换 =====
        let imageMode = 'file'; // 'file' | 'url'

        function switchImageMode(mode) {
            imageMode = mode;
            const fileSection = document.getElementById('file-mode-section');
            const urlSection = document.getElementById('url-mode-section');
            const fileModeBtn = document.getElementById('mode-file-btn');
            const urlModeBtn = document.getElementById('mode-url-btn');
            const fileInput = document.getElementById('file-input');

            if (mode === 'file') {
                fileSection.style.display = 'block';
                urlSection.style.display = 'none';
                fileModeBtn.classList.add('active');
                urlModeBtn.classList.remove('active');
                fileInput.required = true;
            } else {
                fileSection.style.display = 'none';
                urlSection.style.display = 'block';
                fileModeBtn.classList.remove('active');
                urlModeBtn.classList.add('active');
                fileInput.required = false;
                fileInput.value = '';
            }
        }

        // 图片预览（本地文件）
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                const preview = document.getElementById('image-preview');
                const previewContainer = document.getElementById('preview-container');
                const fileInfo = document.getElementById('file-info');

                reader.onload = function(e) {
                    preview.src = e.target.result;
                    previewContainer.classList.add('show');
                    fileInfo.textContent = `已选择：${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
                    fileInfo.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        // URL 输入实时预览
        let urlDebounce = null;
        document.getElementById('image-url-input').addEventListener('input', function() {
            clearTimeout(urlDebounce);
            const url = this.value.trim();
            const previewWrap = document.getElementById('url-preview-wrap');
            const previewImg = document.getElementById('url-preview');
            const urlError = document.getElementById('url-error');

            if (!url) {
                previewWrap.classList.remove('show');
                urlError.style.display = 'none';
                return;
            }

            urlDebounce = setTimeout(() => {
                previewImg.onload = () => {
                    previewWrap.classList.add('show');
                    urlError.style.display = 'none';
                };
                previewImg.onerror = () => {
                    previewWrap.classList.remove('show');
                    urlError.style.display = 'block';
                };
                previewImg.src = url;
            }, 600);
        });

        // 视频文件信息显示
        document.getElementById('video-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const videoInfo = document.getElementById('video-info');
                videoInfo.textContent = `已选择：${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
                videoInfo.style.display = 'block';
            }
        });

        // 表单提交处理（支持文件模式和 URL 模式）
        document.getElementById('image-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const progressContainer = document.getElementById('progress-container');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            const uploadBtn = document.getElementById('upload-btn');
            const confThres = document.getElementById('conf-thres').value;
            const iouThres = document.getElementById('iou-thres').value;

            if (imageMode === 'url') {
                // URL 模式
                const imageUrl = document.getElementById('image-url-input').value.trim();
                if (!imageUrl) {
                    alert('请输入图片网址');
                    return;
                }

                progressContainer.style.display = 'block';
                uploadBtn.disabled = true;
                uploadBtn.textContent = '检测中...';

                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 20;
                    if (progress >= 90) {
                        clearInterval(interval);
                        progressFill.style.width = '90%';
                        progressText.textContent = '正在进行检测...';
                    } else {
                        progressFill.style.width = progress + '%';
                        progressText.textContent = `下载中：${Math.round(progress)}%`;
                    }
                }, 300);

                const formData = new FormData();
                formData.append('image_url', imageUrl);
                formData.append('conf_thres', confThres);
                formData.append('iou_thres', iouThres);

                fetch('/predict_url', { method: 'POST', body: formData })
                    .then(async res => {
                        clearInterval(interval);
                        if (res.redirected) {
                            window.location.href = res.url;
                        } else if (res.ok) {
                            // 服务端返回 HTML 页面，直接替换当前文档
                            const html = await res.text();
                            document.open();
                            document.write(html);
                            document.close();
                        } else {
                            const data = await res.json();
                            alert('检测失败：' + (data.error || '未知错误'));
                            uploadBtn.disabled = false;
                            uploadBtn.textContent = '开始检测';
                            progressContainer.style.display = 'none';
                        }
                    })
                    .catch(err => {
                        clearInterval(interval);
                        alert('请求失败：' + err.message);
                        uploadBtn.disabled = false;
                        uploadBtn.textContent = '开始检测';
                        progressContainer.style.display = 'none';
                    });

            } else {
                // 本地文件模式
                const fileInput = document.getElementById('file-input');
                if (!fileInput.files.length) {
                    alert('请选择图片文件');
                    return;
                }

                progressContainer.style.display = 'block';
                uploadBtn.disabled = true;
                uploadBtn.textContent = '检测中...';

                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 20;
                    if (progress >= 90) {
                        clearInterval(interval);
                        progressFill.style.width = '90%';
                        progressText.textContent = '正在进行检测...';
                    } else {
                        progressFill.style.width = progress + '%';
                        progressText.textContent = `上传进度：${Math.round(progress)}%`;
                    }
                }, 300);

                // 普通 form 提交
                this.submit();
            }
        });

        document.getElementById('video-form').addEventListener('submit', function(e) {
            const progressContainer = document.getElementById('video-progress-container');
            const progressFill = document.getElementById('video-progress-fill');
            const progressText = document.getElementById('video-progress-text');
            const uploadBtn = document.getElementById('video-upload-btn');
            
            progressContainer.style.display = 'block';
            uploadBtn.disabled = true;
            uploadBtn.textContent = '检测中...';
            
            // 模拟进度
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 90) {
                    clearInterval(interval);
                    progressFill.style.width = '90%';
                    progressText.textContent = '正在处理视频...';
                } else {
                    progressFill.style.width = progress + '%';
                    progressText.textContent = `上传进度：${Math.round(progress)}%`;
                }
            }, 300);
        });
    </script>
</body>
</html>
